<script>
const STREAM_URL = '/v1/chat/stream';

let conversationId = generateId();
let isStreaming = false;
let _behaviorProfile = null;

// ==================== Behavior Tracking ====================

function trackBehavior(type, action, metadata = {}) {
    const tenantId = document.getElementById('tenantId').value;
    const userId = document.getElementById('userId').value;
    if (!tenantId || !userId) return;

    fetch('/v1/behavior/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            tenant_id: tenantId,
            user_id: userId,
            event: {
                type,
                action,
                timestamp: new Date().toISOString(),
                metadata: {
                    hour: new Date().getHours(),
                    day: new Date().toLocaleDateString('en-US', { weekday: 'long' }),
                    ...metadata
                }
            }
        })
    }).catch(() => {}); // fire-and-forget
}

async function fetchBehaviorProfile() {
    const tenantId = document.getElementById('tenantId').value;
    const userId = document.getElementById('userId').value;
    if (!tenantId || !userId) return null;

    try {
        const res = await fetch(`/v1/behavior/profile?tenant_id=${encodeURIComponent(tenantId)}&user_id=${encodeURIComponent(userId)}`);
        if (!res.ok) return null;
        return await res.json();
    } catch {
        return null;
    }
}

function dismissNudge(nudgeId, el) {
    const tenantId = document.getElementById('tenantId').value;
    const userId = document.getElementById('userId').value;
    if (!tenantId || !userId) return;

    // Remove the nudge element from the DOM
    const nudgeEl = el.closest('.dash-nudge');
    if (nudgeEl) nudgeEl.remove();

    // Tell the backend
    fetch('/v1/behavior/dismiss', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tenant_id: tenantId, user_id: userId, nudge_id: nudgeId })
    }).catch(() => {});
}

// Auto-detect timezone
document.getElementById('userTimezone').value = Intl.DateTimeFormat().resolvedOptions().timeZone;

// Configure marked
marked.setOptions({
  breaks: true,
  gfm: true,
});

function generateId() {
  return 'conv-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}

function newConversation() {
  conversationId = generateId();
  trackBehavior('session_start', 'login');
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="dashboard" id="dashboard"><div class="dash-loading" id="dashLoading">Loading your briefing...</div></div>';

  // Load dashboard data
  loadDashboard();

  // Clear data cards
  const cards = document.getElementById('dataCards');
  cards.innerHTML = '<div class="panel-empty">No data yet. Tool results will appear here.</div>';

  // Reload notes and reminders for new conversation
  renderNotes();
  renderReminders();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

// Close settings when clicking outside
document.addEventListener('click', (e) => {
  const panel = document.getElementById('settingsPanel');
  if (panel.classList.contains('open') &&
      !panel.contains(e.target) &&
      !e.target.closest('.header-actions')) {
    panel.classList.remove('open');
  }
});

function sendDashAction(text) {
  trackBehavior('dash_action', text);
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ==================== Dashboard ====================

async function loadDashboard() {
  const dashboard = document.getElementById('dashboard');
  if (!dashboard) return;

  const tenantId = document.getElementById('tenantId').value;
  if (!tenantId) {
    dashboard.innerHTML = '<div class="dash-empty">Set a Tenant ID in Settings to see your briefing.</div>';
    return;
  }

  dashboard.innerHTML = '<div class="dash-loading"><div class="spinner" style="margin:0 auto 10px"></div>Loading your briefing...</div>';

  try {
    const [res, profile, localRes] = await Promise.all([
      fetch(`/v1/dashboard?tenant_id=${encodeURIComponent(tenantId)}`),
      fetchBehaviorProfile(),
      fetch('/v1/responsibilities/results').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    ]);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    _behaviorProfile = profile;

    // Overlay local execution results onto dashboard data
    if (localRes && Object.keys(localRes).length > 0) {
      mergeDashboardWithLocalResults(data, localRes);
    }

    renderDashboard(data, profile);
  } catch (err) {
    console.error('Dashboard load failed:', err);
    dashboard.innerHTML = `
      <div class="dash-empty">
        <p>Could not load your briefing.</p>
        <p style="font-size:12px;margin-top:8px;color:var(--text-muted)">${escapeHtml(err.message)}</p>
      </div>
      <div class="dash-actions" style="justify-content:center;margin-top:8px">
        <button class="dash-action" onclick="loadDashboard()">Retry</button>
      </div>
    `;
  }
}

function mergeDashboardWithLocalResults(data, localResults) {
  // Map local execution responses into dashboard data structure.
  // Only overlay if the DB section is empty (no existing data).
  const morningLocal = localResults['morning brief'];
  if (morningLocal && !data.morning_brief) {
    data.morning_brief = {
      summary: morningLocal.response || '',
      result: {},
      completed_at: new Date(morningLocal.started_at * 1000).toISOString(),
    };
    data.last_updated = data.last_updated || data.morning_brief.completed_at;
  }

  const commitmentLocal = localResults['commitment radar'] || localResults['commitments radar'];
  if (commitmentLocal && !data.commitments) {
    data.commitments = {
      summary: commitmentLocal.response || '',
      result: {},
      suggestions: [],
      completed_at: new Date(commitmentLocal.started_at * 1000).toISOString(),
    };
    data.last_updated = data.last_updated || data.commitments.completed_at;
  }

  const meetingLocal = localResults['meeting prep'];
  if (meetingLocal && !data.meeting_prep) {
    data.meeting_prep = {
      summary: meetingLocal.response || '',
      result: {},
      completed_at: new Date(meetingLocal.started_at * 1000).toISOString(),
    };
    data.last_updated = data.last_updated || data.meeting_prep.completed_at;
  }
}

function renderDashboard(data, profile) {
  const dashboard = document.getElementById('dashboard');
  if (!dashboard) return;

  const hasMorning = !!data.morning_brief;
  const hasCommitments = !!data.commitments;
  const hasMeetings = !!data.meeting_prep;
  const hasAny = hasMorning || hasCommitments || hasMeetings;

  // Build personalized greeting
  const userName = document.getElementById('userName').value || 'there';
  const greetingText = (profile && profile.suggested_greeting)
    ? profile.suggested_greeting
    : `Good ${getGreetingTime()}, ${escapeHtml(userName)}`;
  const greetingIsPersonalized = !!(profile && profile.suggested_greeting);

  if (!hasAny) {
    dashboard.innerHTML = `
      <div class="dash-header">
        <h2>${greetingIsPersonalized ? escapeHtml(greetingText) : `Good ${getGreetingTime()}, ${escapeHtml(userName)}`}</h2>
      </div>
      <div class="dash-empty">No playbook data available yet. Run your playbooks to see briefings here.</div>
      <div class="dash-actions" style="justify-content:center">
        <button class="dash-action" onclick="sendDashAction('What can you help me with?')">What can you do?</button>
        <button class="dash-action" onclick="sendDashAction('Fetch my emails from today')">Check emails</button>
        <button class="dash-action" onclick="sendDashAction('Show my Jira tickets')">Jira tickets</button>
      </div>
    `;
    return;
  }

  let html = '';

  // Header with greeting and last updated
  const lastUpdated = data.last_updated ? formatRelativeTime(data.last_updated) : '';
  html += `
    <div class="dash-header">
      <h2>${greetingIsPersonalized ? escapeHtml(greetingText) : `Good ${getGreetingTime()}, ${escapeHtml(userName)}`}</h2>
      ${lastUpdated ? `<span class="dash-time">Updated ${lastUpdated}</span>` : ''}
    </div>
  `;

  // Nudges (from behavior profile)
  if (profile && profile.nudges && profile.nudges.length > 0) {
    html += '<div class="dash-nudges">';
    for (const nudge of profile.nudges) {
      const promptAttr = escapeHtml(nudge.action_prompt).replace(/'/g, '&#39;');
      const idAttr = escapeHtml(nudge.id).replace(/'/g, '&#39;');
      html += `
        <div class="dash-nudge">
          <span class="dash-nudge-icon">&#128161;</span>
          <span class="dash-nudge-text">${escapeHtml(nudge.message)}</span>
          <button class="dash-nudge-action" onclick="sendDashAction('${promptAttr}')">${escapeHtml(nudge.action_label)}</button>
          <button class="dash-nudge-dismiss" onclick="dismissNudge('${idAttr}', this)" title="Dismiss">&times;</button>
        </div>`;
    }
    html += '</div>';
  }

  // Build the three columns
  let prioritiesCol = '';
  let commitmentsCol = '';
  let meetingsCol = '';

  // Morning Brief — only show top priorities
  if (hasMorning) {
    const mb = data.morning_brief;
    let prioritiesContent = '';

    if (mb.result && typeof mb.result === 'object') {
      prioritiesContent = renderTopPriorities(mb.result);
    } else if (mb.summary) {
      try {
        prioritiesContent = marked.parse(mb.summary);
      } catch {
        prioritiesContent = `<p>${escapeHtml(mb.summary)}</p>`;
      }
    }

    prioritiesCol = `
      <div class="dash-section">
        <div class="dash-section-header" onclick="trackBehavior('section_click', 'priorities')" style="cursor:pointer">
          <svg class="dash-section-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
          <span class="dash-section-title">Top Priorities</span>
        </div>
        <div class="dash-section-body">${prioritiesContent || '<p style="color:var(--text-muted)">No priorities available.</p>'}</div>
      </div>
    `;
  }

  // Commitments section
  if (hasCommitments) {
    const cr = data.commitments;
    let commitmentItems = '';
    let resolvedSuggestions = cr.suggestions && cr.suggestions.length > 0 ? cr.suggestions : [];

    // If no suggestions from DB, try extracting from result JSON
    if (resolvedSuggestions.length === 0 && cr.result && typeof cr.result === 'object') {
      resolvedSuggestions = extractCommitmentsFromResult(cr.result);
    }

    if (resolvedSuggestions.length > 0) {
      // Store suggestions globally so the popup can access detail fields
      window.__commitmentSuggestions = resolvedSuggestions;
      commitmentItems = resolvedSuggestions.map((s, idx) => {
        const imp = (s.importance || '').toLowerCase();
        const dotClass = imp === 'high' ? 'high' : imp === 'medium' ? 'medium' : '';
        const dueMeta = s.due_date ? ` &middot; Due ${formatShortDate(s.due_date)}` : '';
        const typeMeta = s.recommendation_type ? ` &middot; ${escapeHtml(s.recommendation_type)}` : '';
        return `
          <div class="dash-commitment" onclick="showCommitmentDetail(${idx})">
            <div class="dash-commitment-dot ${dotClass}"></div>
            <div class="dash-commitment-body">
              <div class="dash-commitment-title">${escapeHtml(s.title)}</div>
              <div class="dash-commitment-meta">${escapeHtml(imp || 'normal')}${typeMeta}${dueMeta}</div>
            </div>
          </div>
        `;
      }).join('');
    } else {
      // No commitments found — show clean empty state
      commitmentItems = `
        <div class="commitment-empty-state">
          <div class="commitment-empty-icon">&#10003;</div>
          <div>No active commitments detected. You're all clear!</div>
        </div>`;
    }

    commitmentsCol = `
      <div class="dash-section">
        <div class="dash-section-header" onclick="trackBehavior('section_click', 'commitments')" style="cursor:pointer">
          <svg class="dash-section-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <span class="dash-section-title">Commitments</span>
        </div>
        <div class="dash-section-body">${commitmentItems}</div>
      </div>
    `;

    // Sync commitments into the Reminders panel
    if (resolvedSuggestions.length > 0) {
      syncDashboardCommitments(resolvedSuggestions);
    }
  }

  // Meeting Prep section
  if (hasMeetings) {
    const mp = data.meeting_prep;
    let meetingContent = '';

    if (mp.result && typeof mp.result === 'object') {
      meetingContent = renderMeetingPrepResult(mp.result);
    } else if (mp.summary) {
      try {
        meetingContent = `<div class="dash-card">${marked.parse(mp.summary)}</div>`;
      } catch {
        meetingContent = `<div class="dash-card"><p>${escapeHtml(mp.summary)}</p></div>`;
      }
    }

    if (meetingContent) {
      meetingsCol = `
        <div class="dash-section">
          <div class="dash-section-header" onclick="trackBehavior('section_click', 'meetings')" style="cursor:pointer">
            <svg class="dash-section-icon" viewBox="0 0 24 24" fill="none" stroke="#81c784" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span class="dash-section-title">Upcoming Meetings</span>
          </div>
          <div class="dash-section-body">${meetingContent}</div>
        </div>
      `;
    }
  }

  // Determine grid columns based on available data, reordered by engagement
  const sectionMap = {
    priorities: prioritiesCol,
    commitments: commitmentsCol,
    meetings: meetingsCol,
  };
  const defaultOrder = ['priorities', 'commitments', 'meetings'];
  let sectionOrder = defaultOrder;

  if (profile && profile.section_engagement && profile.section_engagement.length > 0) {
    // Build order from engagement, then fill in any missing sections
    const engaged = profile.section_engagement.filter(s => defaultOrder.includes(s));
    const remaining = defaultOrder.filter(s => !engaged.includes(s));
    sectionOrder = [...engaged, ...remaining];
  }

  const cols = sectionOrder.map(s => sectionMap[s]).filter(Boolean);
  if (cols.length > 0) {
    const colCount = cols.length;
    html += `<div class="dash-grid" style="grid-template-columns: repeat(${colCount}, 1fr)">${cols.join('')}</div>`;
  }

  // Quick actions (adaptive from profile)
  const actions = (profile && profile.suggested_actions && profile.suggested_actions.length > 0)
    ? profile.suggested_actions
    : [
        { label: 'Morning brief', prompt: 'Give me my morning brief' },
        { label: 'Commitments', prompt: 'What are my open commitments?' },
        { label: 'Meeting prep', prompt: 'Prep me for my next meeting' },
        { label: 'Check emails', prompt: 'Fetch my emails from today' },
      ];
  html += '<div class="dash-actions">';
  for (const a of actions) {
    const promptSafe = escapeHtml(a.prompt).replace(/'/g, '&#39;');
    html += `<button class="dash-action" onclick="sendDashAction('${promptSafe}')">${escapeHtml(a.label)}</button>`;
  }
  html += '</div>';

  dashboard.innerHTML = html;
}

function renderTopPriorities(result) {
  // Result structure: { markdown_output: "...", assistant_response: { summary: "...", final_output: { sections: [...] } } }
  // The priorities are embedded in the markdown under "TOP PRIORITIES REQUIRING YOUR ATTENTION"

  // 1. Try structured top_5_priorities (if present from older format)
  const priorities = result.top_5_priorities || result.priorities || result.top_priorities;
  if (Array.isArray(priorities) && priorities.length > 0) {
    return priorities.map(p => {
      const title = typeof p === 'string' ? p : (p.title || p.description || '');
      const rec = (typeof p === 'object' && p !== null) ? (p.recommendation || '') : '';
      return `
        <div class="dash-priority">
          <div class="dash-priority-dot"></div>
          <div class="dash-priority-body">
            <div class="dash-priority-title">${escapeHtml(title)}</div>
            ${rec ? `<div class="dash-priority-meta">${escapeHtml(rec)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // 2. Parse priorities from markdown_output or summary
  const mdSource = result.markdown_output || result.summary ||
    (result.assistant_response && (result.assistant_response.summary || result.assistant_response.markdown_output)) || '';

  if (mdSource) {
    const parsed = parsePrioritiesFromMarkdown(mdSource);
    if (parsed.length > 0) {
      return parsed.map(p => `
        <div class="dash-priority">
          <div class="dash-priority-dot"></div>
          <div class="dash-priority-body">
            <div class="dash-priority-title">${escapeHtml(p.title)}</div>
            ${p.recommendation ? `<div class="dash-priority-meta">${escapeHtml(p.recommendation)}</div>` : ''}
          </div>
        </div>
      `).join('');
    }
  }

  return '<p style="color:var(--text-muted)">No priorities available.</p>';
}

function parsePrioritiesFromMarkdown(md) {
  // Extract priorities from morning brief markdown.
  // Format: bold title lines followed by bullet points with Insight/Implication/Recommendation
  const priorities = [];

  // Find the "TOP PRIORITIES" section
  const priSection = md.split(/#{2,3}\s*TOP PRIORITIES[^\n]*/i);
  if (priSection.length < 2) {
    // Try alternate: look for bold titles that look like priorities after executive summary
    const altSection = md.split(/#{2,3}\s*MEETING OUTPUTS|#{2,3}\s*YOUR DAY/i);
    if (altSection.length >= 1) {
      extractBoldTitleBlocks(altSection[0], priorities);
    }
    return priorities;
  }

  // Take text between TOP PRIORITIES heading and the next heading
  let section = priSection[1];
  const nextHeading = section.search(/\n#{2,3}\s/);
  if (nextHeading > 0) section = section.slice(0, nextHeading);

  extractBoldTitleBlocks(section, priorities);
  return priorities;
}

function extractBoldTitleBlocks(text, priorities) {
  // Match bold titles: **Title Here**
  const blocks = text.split(/\n\*\*([^*]+)\*\*\s*\n/);
  // blocks: [before, title1, content1, title2, content2, ...]
  for (let i = 1; i < blocks.length; i += 2) {
    const title = blocks[i].trim();
    const content = (blocks[i + 1] || '').trim();

    // Skip titles that look like sub-fields (Insight:, Implication:, etc.)
    if (/^(insight|implication|recommendation|decisions|follow-through|what's still)/i.test(title)) continue;
    // Skip very short or empty titles
    if (title.length < 5) continue;

    // Extract recommendation from the content bullets
    let recommendation = '';
    const recMatch = content.match(/\*\*Recommendation:\*\*\s*(.+)/i);
    if (recMatch) {
      recommendation = recMatch[1].trim();
    } else {
      // Use first bullet as a fallback summary
      const firstBullet = content.match(/^-\s+\*\*\w+:\*\*\s*(.+)/m);
      if (firstBullet) recommendation = firstBullet[1].trim();
    }

    priorities.push({ title, recommendation });
  }
}

function extractCommitmentsFromResult(result) {
  // Try to extract structured commitment items from the result JSON.
  // The result may contain suggestions/commitments/items arrays, or
  // an assistant_response with structured data, or markdown to parse.
  const items = result.suggestions || result.commitments || result.items ||
    result.recommendations || result.action_items;
  if (Array.isArray(items) && items.length > 0) {
    return items.map(item => ({
      title: item.title || item.name || item.description || '',
      description: item.description || item.details || '',
      observation: item.observation || item.context || '',
      recommendation_type: item.recommendation_type || item.type || '',
      due_date: item.due_date || item.due || '',
      importance: item.importance || item.priority || '',
    })).filter(i => i.title);
  }

  // Try nested assistant_response
  const ar = result.assistant_response;
  if (ar && typeof ar === 'object') {
    const nested = ar.suggestions || ar.commitments || ar.items ||
      ar.recommendations || ar.action_items;
    if (Array.isArray(nested) && nested.length > 0) {
      return nested.map(item => ({
        title: item.title || item.name || item.description || '',
        description: item.description || item.details || '',
        observation: item.observation || item.context || '',
        recommendation_type: item.recommendation_type || item.type || '',
        due_date: item.due_date || item.due || '',
        importance: item.importance || item.priority || '',
      })).filter(i => i.title);
    }

    // Try final_output
    const fo = ar.final_output;
    if (fo && typeof fo === 'object') {
      const foItems = fo.suggestions || fo.commitments || fo.items;
      if (Array.isArray(foItems) && foItems.length > 0) {
        return foItems.map(item => ({
          title: item.title || item.name || item.description || '',
          description: item.description || item.details || '',
          observation: item.observation || item.context || '',
          recommendation_type: item.recommendation_type || item.type || '',
          due_date: item.due_date || item.due || '',
          importance: item.importance || item.priority || '',
        })).filter(i => i.title);
      }
    }
  }

  // Try parsing from markdown_output
  const md = result.markdown_output || (ar && ar.summary) || '';
  if (md) {
    const parsed = parseCommitmentsFromMarkdown(md);
    if (parsed.length > 0) return parsed;
  }

  return [];
}

function parseCommitmentsFromMarkdown(md) {
  // Extract commitment items from markdown bold-title blocks
  const commitments = [];
  const blocks = md.split(/\n\*\*([^*]+)\*\*\s*\n/);
  for (let i = 1; i < blocks.length; i += 2) {
    const title = blocks[i].trim();
    const content = (blocks[i + 1] || '').trim();
    if (title.length < 5) continue;
    if (/^(executive summary|overview|bottom line|no commitments|summary)/i.test(title)) continue;

    let description = '';
    const descMatch = content.match(/\*\*(?:Description|Details|Observation):\*\*\s*(.+)/i);
    if (descMatch) description = descMatch[1].trim();

    let importance = '';
    const impMatch = content.match(/\*\*(?:Importance|Priority|Urgency):\*\*\s*(.+)/i);
    if (impMatch) importance = impMatch[1].trim();

    commitments.push({ title, description, observation: '', recommendation_type: '', due_date: '', importance });
  }
  return commitments;
}

function renderMeetingPrepResult(result) {
  // Result structure: { markdown_output: "...", assistant_response: { summary: "...", final_output: { sections: [...] } } }
  const nonMeetingSections = ['what\'s next', 'axari recommends'];

  // 1. Try structured sections from assistant_response.final_output.sections
  const sections = result?.assistant_response?.final_output?.sections ||
                   result?.final_output?.sections || [];

  // Filter to actual meeting sections (not recommendations)
  const meetingSections = sections.filter(s =>
    s.title && !nonMeetingSections.includes(s.title.toLowerCase().trim())
  );

  if (meetingSections.length > 0) {
    const now = new Date();

    const parsed = meetingSections.map(s => {
      const info = parseMeetingContent(s.content || '');
      return { title: s.title, ...info };
    });

    // Filter out past meetings.
    // If date couldn't be parsed, exclude the meeting — stale playbook data
    // with unparseable dates is more likely past than future.
    const upcoming = parsed.filter(m => {
      if (!m.dateTime) return false;
      return m.dateTime > now;
    });

    if (upcoming.length === 0) {
      return '<p style="color:var(--text-muted)">No upcoming meetings.</p>';
    }

    // Sort by time
    upcoming.sort((a, b) => (a.dateTime || 0) - (b.dateTime || 0));

    return upcoming.map(m => {
      const onclick = m.link ? `onclick="window.open('${m.link.replace(/'/g, "\\'")}', '_blank')"` : '';
      const linkIcon = m.link ? `
        <svg class="dash-meeting-link-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>` : '';

      return `
        <div class="dash-meeting" ${onclick}>
          ${m.timeDisplay ? `<div class="dash-meeting-time">${escapeHtml(m.timeDisplay)}</div>` : ''}
          <div class="dash-meeting-body">
            <div class="dash-meeting-title">${escapeHtml(m.title)}</div>
            ${m.attendees ? `<div class="dash-meeting-attendees">${escapeHtml(m.attendees)}</div>` : ''}
          </div>
          ${linkIcon}
        </div>
      `;
    }).join('');
  }

  // 2. Fallback: try parsing meetings from markdown summary
  const summaryMd = result?.assistant_response?.summary || result?.summary || '';
  if (summaryMd) {
    const meetingItems = parseMeetingsFromSummary(summaryMd);
    // Filter out past meetings from summary using any embedded dates
    const now2 = new Date();
    const upcomingSummary = meetingItems.filter(m => {
      if (!m.dateTime) return false; // exclude if date unknown — likely stale
      return m.dateTime > now2;
    });
    if (upcomingSummary.length > 0) {
      upcomingSummary.sort((a, b) => (a.dateTime || 0) - (b.dateTime || 0));
      return upcomingSummary.map(m => `
        <div class="dash-meeting">
          ${m.timeDisplay ? `<div class="dash-meeting-time">${escapeHtml(m.timeDisplay)}</div>` : ''}
          <div class="dash-meeting-body">
            <div class="dash-meeting-title">${escapeHtml(m.title)}</div>
            ${m.desc ? `<div class="dash-meeting-attendees">${escapeHtml(m.desc)}</div>` : ''}
          </div>
        </div>
      `).join('');
    }
  }

  return '<p style="color:var(--text-muted)">No upcoming meetings.</p>';
}

function parseMeetingContent(content) {
  // Extract date/time, meeting link, and attendees from section content
  let dateTime = null;
  let timeDisplay = '';
  let link = '';
  let attendees = '';

  // Try multiple date/time patterns from the meeting content:

  // Pattern 1: "**Date/Time:** 2026-02-16 | 07:30-08:00 UTC"
  const dtMatch = content.match(/\*\*Date\/Time:\*\*\s*(\d{4}-\d{2}-\d{2})\s*\|\s*(\d{2}:\d{2})/);
  // Pattern 2: "**Date/Time:** 2026-02-16 07:30" (without pipe separator)
  const dtMatch2 = content.match(/\*\*Date\/Time:\*\*\s*(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
  // Pattern 3: "**Date:** 2026-02-16" (date only, no time)
  const dateOnlyMatch = content.match(/\*\*Date:\*\*\s*(\d{4}-\d{2}-\d{2})/);
  // Pattern 4: Bare ISO date anywhere in content (YYYY-MM-DD)
  const isoDateMatch = content.match(/(\d{4}-\d{2}-\d{2})\s*[\|,]?\s*(\d{2}:\d{2})?/);
  // Pattern 5: "**Date/Time:** February 16, 2026" or "**Date:** Feb 16, 2026"
  const naturalDateMatch = content.match(/\*\*Date(?:\/Time)?:\*\*\s*([A-Za-z]+\s+\d{1,2},?\s+\d{4})/);

  const matched = dtMatch || dtMatch2;
  if (matched) {
    const dateStr = matched[1];
    const timeStr = matched[2];
    try {
      dateTime = new Date(dateStr + 'T' + timeStr + ':00Z');
      if (isNaN(dateTime.getTime())) dateTime = null;
    } catch { dateTime = null; }
  } else if (dateOnlyMatch) {
    try {
      dateTime = new Date(dateOnlyMatch[1] + 'T00:00:00Z');
      if (isNaN(dateTime.getTime())) dateTime = null;
    } catch { dateTime = null; }
  } else if (naturalDateMatch) {
    try {
      dateTime = new Date(naturalDateMatch[1]);
      if (isNaN(dateTime.getTime())) dateTime = null;
    } catch { dateTime = null; }
  } else if (isoDateMatch) {
    try {
      const ds = isoDateMatch[1];
      const ts = isoDateMatch[2] || '00:00';
      dateTime = new Date(ds + 'T' + ts + ':00Z');
      if (isNaN(dateTime.getTime())) dateTime = null;
    } catch { dateTime = null; }
  }

  // Build a human-readable time display
  if (dateTime && !isNaN(dateTime.getTime())) {
    timeDisplay = dateTime.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const today = new Date();
    if (dateTime.toDateString() !== today.toDateString()) {
      timeDisplay = dateTime.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + timeDisplay;
    }
  }

  // Meeting link: "[Meeting](URL)" or "[Meeting Link](URL)"
  const linkMatch = content.match(/\[Meeting[^\]]*\]\(([^)]+)\)/i);
  if (linkMatch) {
    link = linkMatch[1];
  }

  // Attendees: "**Attendees:** Name1, Name2, ..."
  const attMatch = content.match(/\*\*Attendees:\*\*\s*([^\n]+)/);
  if (attMatch) {
    attendees = attMatch[1].trim();
  }

  return { dateTime, timeDisplay, link, attendees };
}

function parseMeetingsFromSummary(md) {
  // Fallback: extract meeting names and dates from summary triage bullets
  const items = [];
  const lines = md.split('\n');
  for (const line of lines) {
    // Match numbered or bulleted meeting items: "1. **Meeting Title** — desc"
    const m = line.match(/^\s*(?:\d+\.\s*|\-\s*)\*\*([^*]+)\*\*\s*(?:—|–|-)\s*(.+)/);
    if (m) {
      const title = m[1].trim();
      const desc = m[2].trim();
      // Try to extract a date from the description or title
      let dateTime = null;
      let timeDisplay = '';
      const isoMatch = (desc + ' ' + title).match(/(\d{4}-\d{2}-\d{2})(?:\s*[\|,]?\s*(\d{2}:\d{2}))?/);
      if (isoMatch) {
        try {
          const ts = isoMatch[2] || '00:00';
          dateTime = new Date(isoMatch[1] + 'T' + ts + ':00Z');
          if (isNaN(dateTime.getTime())) dateTime = null;
        } catch { dateTime = null; }
      }
      if (dateTime && !isNaN(dateTime.getTime())) {
        timeDisplay = dateTime.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        const today = new Date();
        if (dateTime.toDateString() !== today.toDateString()) {
          timeDisplay = dateTime.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + timeDisplay;
        }
      }
      items.push({ title, desc, dateTime, timeDisplay });
    }
  }
  return items;
}

function getGreetingTime() {
  const hour = new Date().getHours();
  if (hour < 12) return 'morning';
  if (hour < 17) return 'afternoon';
  return 'evening';
}

function formatRelativeTime(isoStr) {
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days === 1) return 'yesterday';
    if (days < 7) return `${days}d ago`;
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  } catch {
    return '';
  }
}

function formatShortDate(dateStr) {
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  } catch {
    return dateStr;
  }
}

// ==================== Execution polling & notifications ====================
const activePolls = new Map();

function startExecutionPolling(executionId, playbookName, workerName) {
  if (activePolls.has(executionId)) return;

  const POLL_INTERVAL = 10000;       // 10 seconds
  const MAX_POLL_DURATION = 1800000; // 30 minutes
  const startTime = Date.now();

  const intervalId = setInterval(async () => {
    if (Date.now() - startTime > MAX_POLL_DURATION) {
      clearInterval(intervalId);
      activePolls.delete(executionId);
      return;
    }
    try {
      const apiBase = (document.getElementById('apiUrl').value || '').replace(/\/+$/, '');
      const resp = await fetch(`${apiBase}/v1/execution/${executionId}/status`);
      if (!resp.ok) return;
      const data = await resp.json();
      const terminal = ['success', 'failed', 'error', 'completed'];
      if (terminal.includes(data.status)) {
        clearInterval(intervalId);
        activePolls.delete(executionId);
        showExecutionNotification({
          executionId,
          status: data.status,
          playbookName: data.playbook_name || playbookName,
          workerName: data.worker_name || workerName,
        });
      }
    } catch (_) { /* ignore fetch errors, retry on next interval */ }
  }, POLL_INTERVAL);

  activePolls.set(executionId, intervalId);
}

function showExecutionNotification({ executionId, status, playbookName, workerName }) {
  const container = document.getElementById('toastContainer');
  const isError = (status === 'failed' || status === 'error');
  const initials = (workerName || 'AI').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const appUrl = (document.getElementById('axariAppUrl').value || '').replace(/\/+$/, '');
  const execUrl = appUrl ? `${appUrl}/worker-job-details/${executionId}` : '#';

  const toast = document.createElement('div');
  toast.className = 'notification-toast' + (isError ? ' toast-error' : '');
  toast.innerHTML = `
    <div class="notification-toast-icon">${escapeHtml(initials)}</div>
    <div class="notification-toast-body">
      <div class="notification-toast-title">${escapeHtml(workerName)}</div>
      <div class="notification-toast-message">${
        isError
          ? `Your <strong>${escapeHtml(playbookName)}</strong> execution encountered an error.`
          : `Your <strong>${escapeHtml(playbookName)}</strong> execution is completed.`
      }</div>
      <div class="notification-toast-actions">
        <a href="${execUrl}" target="_blank" rel="noopener noreferrer">View Result</a>
      </div>
    </div>
    <button class="notification-toast-close" onclick="dismissToast(this)">&times;</button>`;
  container.appendChild(toast);

  // Auto-dismiss after 10 seconds
  setTimeout(() => {
    if (toast.parentNode) {
      toast.classList.add('toast-exit');
      toast.addEventListener('animationend', () => toast.remove());
    }
  }, 10000);
}

function dismissToast(btn) {
  const toast = btn.closest('.notification-toast');
  if (toast) {
    toast.classList.add('toast-exit');
    toast.addEventListener('animationend', () => toast.remove());
  }
}

function finalizeAssistantMessage(responseText, trajectory, tokenUsage) {
  const thinking = document.getElementById('activeThinking');
  if (thinking) thinking.remove();

  // Check if response was already streamed via chunks
  const streamMsg = document.getElementById('streamingMessage');
  let msgDiv;
  let contentDiv;

  if (streamMsg && streamedResponseText) {
    // Response was streamed -- reuse the existing message div
    msgDiv = streamMsg;
    msgDiv.removeAttribute('id');
    contentDiv = msgDiv.querySelector('.message-content');
    const bubble = msgDiv.querySelector('.message-bubble');
    if (bubble) {
      bubble.removeAttribute('id');
      bubble.innerHTML = marked.parse(streamedResponseText);
    }
  } else {
    // Fallback: full response arrived at once
    if (streamMsg) streamMsg.remove();
    const msgs = document.getElementById('messages');
    msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';
    msgDiv.innerHTML = `<div class="message-row">
        <img class="assistant-avatar" src="/static/atlas-circle.svg" alt="Atlas" onerror="this.style.display='none'" />
        <div class="message-content">
          <span class="message-label">Atlas</span>
          <div class="message-bubble">${marked.parse(responseText)}</div>
        </div>
      </div>`;
    msgs.appendChild(msgDiv);
    contentDiv = msgDiv.querySelector('.message-content');
  }

  // Use contentDiv for appending sub-elements so they align with the bubble
  const appendTarget = contentDiv || msgDiv;

  // Trajectory
  if (trajectory && trajectory.length > 0) {
    const trajId = 'traj-' + Date.now();
    const trajHtml = document.createElement('div');
    trajHtml.innerHTML = `
      <div class="trajectory-toggle" onclick="toggleTrajectory('${trajId}', this)">
        <span class="arrow">&#9654;</span>
        <span>${trajectory.length} tool call${trajectory.length > 1 ? 's' : ''}</span>
      </div>
      <div class="trajectory-panel" id="${trajId}">
        ${trajectory.map(t => `
          <div class="trajectory-step">
            <div><span class="tool-name">${escapeHtml(t.tool || '')}</span></div>
            ${t.thought ? `<div style="color:#8b8fa3;margin-top:2px">${escapeHtml(t.thought.slice(0,200))}</div>` : ''}
            ${t.observation ? `<div class="observation">${escapeHtml(t.observation.slice(0,300))}</div>` : ''}
          </div>`).join('')}
      </div>`;
    while (trajHtml.firstChild) appendTarget.appendChild(trajHtml.firstChild);
  }

  // Token usage and time
  if (tokenUsage && (tokenUsage.input || tokenUsage.output)) {
    const elapsed = tokenUsage.elapsed_seconds;
    const timeStr = elapsed >= 60
      ? `${Math.floor(elapsed / 60)}m ${(elapsed % 60).toFixed(1)}s`
      : `${elapsed}s`;
    const info = document.createElement('div');
    info.className = 'token-info';
    info.innerHTML = `
      <span>In: ${(tokenUsage.input || 0).toLocaleString()}</span>
      <span>Out: ${(tokenUsage.output || 0).toLocaleString()}</span>
      ${elapsed != null ? `<span>Time: ${timeStr}</span>` : ''}`;
    appendTarget.appendChild(info);
  }

  // Playbook execution card + polling
  if (trajectory && trajectory.length > 0) {
    const triggerStep = trajectory.find(t => t.tool === 'trigger_responsibility');
    if (triggerStep && triggerStep.observation) {
      const execMatch = triggerStep.observation.match(/Execution ID:\s*`?([0-9a-f-]{36})`?/i);
      const nameMatch = triggerStep.observation.match(/Successfully triggered \*\*(.+?)\*\*/);
      const workerMatch = triggerStep.observation.match(/Worker:\s*(.+?)\)/);
      if (execMatch) {
        const executionId = execMatch[1];
        const playbookName = nameMatch ? nameMatch[1] : 'Playbook';
        const workerName = workerMatch ? workerMatch[1].trim() : 'AI Worker';
        const appUrl = (document.getElementById('axariAppUrl').value || '').replace(/\/+$/, '');
        const execUrl = appUrl ? `${appUrl}/worker-job-details/${executionId}` : '#';

        const card = document.createElement('a');
        card.className = 'playbook-exec-card';
        card.href = execUrl;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.innerHTML = `
          <div class="playbook-exec-card-icon">&#9654;</div>
          <div class="playbook-exec-card-body">
            <div class="playbook-exec-card-title">${escapeHtml(playbookName)}</div>
            <div class="playbook-exec-card-sub">View execution details</div>
          </div>
          <div class="playbook-exec-card-arrow">&#8250;</div>`;
        appendTarget.appendChild(card);

        // Start polling for execution completion
        startExecutionPolling(executionId, playbookName, workerName);
      }
    }
  }

  // Feedback thumbs + regenerate
  const msgId = 'msg-' + Date.now();
  const feedbackDiv = document.createElement('div');
  feedbackDiv.className = 'feedback-actions';
  feedbackDiv.setAttribute('data-msg-id', msgId);
  feedbackDiv.innerHTML = `
    <button class="feedback-btn thumbs-up" onclick="submitMessageFeedback(this, 'up')" title="Helpful">&#128077;</button>
    <button class="feedback-btn thumbs-down" onclick="submitMessageFeedback(this, 'down')" title="Not helpful">&#128078;</button>
    <button class="msg-action-btn regenerate-btn" onclick="regenerateResponse()" title="Regenerate — hold to add guidance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>`;
  appendTarget.appendChild(feedbackDiv);

  // Attach hover listener for regenerate guidance popup
  const regenBtn = feedbackDiv.querySelector('.regenerate-btn');
  if (regenBtn) setupRegenHover(regenBtn);

  scrollToBottom();
}

let _regenHoverTimer = null;
let _regenCloseTimer = null;
let _activeRegenPopup = null;

function setupRegenHover(btn) {
  const feedbackRow = btn.closest('.feedback-actions');

  btn.addEventListener('mouseenter', () => {
    clearTimeout(_regenCloseTimer);
    if (!_activeRegenPopup) {
      _regenHoverTimer = setTimeout(() => showRegenPopup(feedbackRow), 3000);
    }
  });
  btn.addEventListener('mouseleave', () => {
    clearTimeout(_regenHoverTimer);
  });
}

function showRegenPopup(feedbackRow) {
  closeRegenPopup();
  const popup = document.createElement('div');
  popup.className = 'regen-popup';
  popup.innerHTML = `
    <div class="regen-popup-label">What should be different?</div>
    <input type="text" class="regen-popup-input" placeholder="e.g. more concise, include examples..." />
    <div class="regen-popup-actions">
      <button onclick="closeRegenPopup()">Cancel</button>
      <button class="regen-submit" onclick="submitRegenWithGuidance(this)">Regenerate</button>
    </div>`;
  feedbackRow.appendChild(popup);
  _activeRegenPopup = popup;

  const input = popup.querySelector('input');
  input.focus();
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submitRegenWithGuidance(popup.querySelector('.regen-submit')); }
    if (e.key === 'Escape') closeRegenPopup();
  });

  // Prevent click-through closing
  popup.addEventListener('click', (e) => e.stopPropagation());
}

function closeRegenPopup() {
  if (_activeRegenPopup) {
    _activeRegenPopup.remove();
    _activeRegenPopup = null;
  }
}

// Close popup on outside click
document.addEventListener('click', (e) => {
  if (_activeRegenPopup && !_activeRegenPopup.contains(e.target) && !e.target.closest('.regenerate-btn')) {
    closeRegenPopup();
  }
});

function submitRegenWithGuidance(btn) {
  const popup = btn.closest('.regen-popup');
  const guidance = popup.querySelector('input').value.trim();
  closeRegenPopup();
  regenerateResponse(guidance);
}

function regenerateResponse(guidance) {
  if (isStreaming) return;
  // Find the last user message text
  const userMsgs = document.querySelectorAll('.message.user .message-actions');
  if (userMsgs.length === 0) return;
  const lastActions = userMsgs[userMsgs.length - 1];
  const text = decodeHtmlEntities(lastActions.getAttribute('data-text'));
  if (!text) return;

  // Extract the old response text before removing
  const allMsgs = document.getElementById('messages').children;
  let oldResponsePreview = '';
  for (let i = allMsgs.length - 1; i >= 0; i--) {
    const el = allMsgs[i];
    if (el.classList.contains('message') && el.classList.contains('assistant')) {
      const bubble = el.querySelector('.message-bubble');
      if (bubble) oldResponsePreview = bubble.textContent.slice(0, 150);
      el.remove();
      break;
    }
  }

  // Log feedback (with guidance if provided)
  const items = loadFeedbackData();
  const feedbackEntry = {
    type: 'regenerate',
    comment: `Regenerated response for: "${text.slice(0, 100)}"`,
    original_response: oldResponsePreview,
    timestamp: Date.now(),
  };
  if (guidance) feedbackEntry.guidance = guidance;
  items.push(feedbackEntry);
  saveFeedbackData(items);
  renderFeedback();
  trackBehavior('feedback', 'regenerate', { prompt: text.slice(0, 100), guidance: guidance || '' });

  // Build the message — append guidance as instruction if provided
  const finalMessage = guidance
    ? `${text}\n\n[User feedback on previous response: ${guidance}]`
    : text;

  document.getElementById('userInput').value = finalMessage;
  sendMessage({ skipUserMessage: true });
}

function formatToolName(rawName) {

  let name = rawName;

// ==================== Structured Data Renderer ====================

function renderStructuredData(data) {
  if (data === null || data === undefined) {
    return `<span style="color:var(--text-muted)">null</span>`;
  }

  if (typeof data !== 'object') {
    return `<pre>${escapeHtml(String(data))}</pre>`;
  }

  if (Array.isArray(data)) {
    if (data.length === 0) {
      return `<span style="color:var(--text-muted)">Empty list</span>`;
    }

    // Array of objects — render each as a collapsible sub-card
    if (typeof data[0] === 'object' && data[0] !== null) {
      return data.map((item, i) => {
        const summary = getObjectSummary(item, i);
        const body = renderObjectAsTable(item);
        const itemId = 'struct-' + Date.now() + '-' + i;
        return `<div class="struct-item" id="${itemId}">
          <div class="struct-item-header" onclick="document.getElementById('${itemId}').classList.toggle('expanded')">
            <span class="arrow">&#9654;</span>
            <span>${summary}</span>
          </div>
          <div class="struct-item-body">${body}</div>
        </div>`;
      }).join('');
    }

    // Array of primitives
    return `<pre>${escapeHtml(data.map(v => String(v)).join('\n'))}</pre>`;
  }

  // Single object
  return renderObjectAsTable(data);
}

function getObjectSummary(obj, index) {
  // Try to find a good summary field
  const summaryKeys = ['subject', 'title', 'name', 'summary', 'key', 'id', 'email', 'from'];
  for (const key of summaryKeys) {
    if (obj[key] && typeof obj[key] === 'string') {
      const val = obj[key].length > 60 ? obj[key].slice(0, 60) + '...' : obj[key];
      return escapeHtml(val);
    }
  }
  return `Item ${index + 1}`;
}

function renderObjectAsTable(obj) {
  if (!obj || typeof obj !== 'object') {
    return `<pre>${escapeHtml(String(obj))}</pre>`;
  }

  const rows = Object.entries(obj).map(([key, value]) => {
    let rendered;
    if (value === null || value === undefined) {
      rendered = '<span style="color:var(--text-muted)">-</span>';
    } else if (typeof value === 'object') {
      // Nested object/array — render recursively
      rendered = renderStructuredData(value);
    } else {
      const str = String(value);
      if (str.length > 200) {
        // Long value — show more/less toggle
        const toggleId = 'lv-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
        rendered = `<span class="long-value-preview" id="${toggleId}-p">${escapeHtml(str.slice(0, 200))}...</span>` +
          `<span class="long-value-full" id="${toggleId}-f">${escapeHtml(str)}</span>` +
          `<span class="show-more-toggle" onclick="toggleLongValue('${toggleId}', this)">Show more</span>`;
      } else {
        rendered = escapeHtml(str);
      }
    }

    const displayKey = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    return `<tr><td>${escapeHtml(displayKey)}</td><td>${rendered}</td></tr>`;
  }).join('');

  return `<table class="struct-table">${rows}</table>`;
}

function toggleLongValue(id, toggleEl) {
  const preview = document.getElementById(id + '-p');
  const full = document.getElementById(id + '-f');
  const isExpanded = full.classList.toggle('visible');
  preview.classList.toggle('hidden', isExpanded);
  toggleEl.textContent = isExpanded ? 'Show less' : 'Show more';
}

// Notes data model: array of { content, source: "agent"|"user", timestamp }
function getNotesKey() {
  return `notes-${conversationId}`;
}

function loadNotesData() {
  try {
    const raw = localStorage.getItem(getNotesKey());
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    // Migration: if old format was a plain string, convert it
    if (typeof parsed === 'string') {
      if (!parsed.trim()) return [];
      return [{ content: parsed, source: 'user', timestamp: Date.now() }];
    }
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveNotesData(notes) {
  localStorage.setItem(getNotesKey(), JSON.stringify(notes));
}

function renderNotes() {
  const list = document.getElementById('notesList');
  const notes = loadNotesData();
  const empty = document.getElementById('notesEmpty');

  if (notes.length === 0) {
    list.innerHTML = '<div class="panel-empty" id="notesEmpty">No notes yet. Notes from Axari and your own will appear here.</div>';
    return;
  }

  list.innerHTML = '';
  notes.forEach((note, i) => {
    const entry = document.createElement('div');
    entry.className = 'note-entry';

    const sourceLabel = note.source === 'agent' ? 'Axari' : 'You';
    const sourceClass = note.source === 'agent' ? 'agent' : 'user';
    const timeStr = formatNoteTime(note.timestamp);

    // Render markdown content
    let bodyHtml;
    try {
      bodyHtml = marked.parse(note.content);
    } catch {
      bodyHtml = escapeHtml(note.content);
    }

    entry.innerHTML = `
      <div class="note-header">
        <span class="note-source ${sourceClass}">${sourceLabel}</span>
        <span class="note-time">${timeStr}</span>
        <button class="note-delete" onclick="event.stopPropagation(); deleteNote(${i})" title="Delete note">&times;</button>
      </div>
      <div class="note-body" id="noteBody-${i}">${bodyHtml}</div>
    `;
    entry.style.cursor = 'pointer';
    entry.addEventListener('click', () => openNoteViewer(i));
    list.appendChild(entry);
  });

  // Mark truncated notes after rendering
  requestAnimationFrame(() => {
    notes.forEach((_, i) => {
      const body = document.getElementById(`noteBody-${i}`);
      if (body && body.scrollHeight > body.clientHeight) {
        body.classList.add('truncated');
      }
    });
  });

  // Scroll to bottom to show latest note
  list.scrollTop = list.scrollHeight;
}

function formatNoteTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  // If today, show just time; otherwise show date + time
  if (d.toDateString() === now.toDateString()) {
    return time;
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
}

function openNoteEditor() {
  document.getElementById('notesHome').style.display = 'none';
  const editor = document.getElementById('notesEditor');
  editor.classList.add('active');
  const input = document.getElementById('noteInput');

function closeNoteEditor() {

}

function saveAndCloseNote() {
  const input = document.getElementById('noteInput');
  const content = input.value.trim();
  if (content) {
    const notes = loadNotesData();
    notes.push({ content, source: 'user', timestamp: Date.now() });
    saveNotesData(notes);
    renderNotes();
  }
  closeNoteEditor();
}

function deleteNote(index) {
  const notes = loadNotesData();
  if (index >= 0 && index < notes.length) {
    notes.splice(index, 1);
    saveNotesData(notes);
    renderNotes();
  }
}

function handleNoteKeyDown(e) {
  // Ctrl/Cmd + Enter to save
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    saveAndCloseNote();
  }

function handlePanelNote(data) {
  openPanel('notes');

  const notes = loadNotesData();

  if (data.mode === 'replace') {

    saveNotesData(userNotes);
  } else {
    notes.push({ content: data.content, source: 'agent', timestamp: Date.now() });
    saveNotesData(notes);
  }

  renderNotes();

function getFeedbackKey() {

}

function loadFeedbackData() {
  try {
    const raw = localStorage.getItem(getFeedbackKey());
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveFeedbackData(items) {
  localStorage.setItem(getFeedbackKey(), JSON.stringify(items));
}

function submitMessageFeedback(btn, rating) {
  const container = btn.closest('.feedback-actions');
  const buttons = container.querySelectorAll('.feedback-btn');

  // Find the message preview from the bubble
  const msgDiv = container.closest('.message');
  const bubble = msgDiv ? msgDiv.querySelector('.message-bubble') : null;
  const preview = bubble ? bubble.textContent.slice(0, 100) : '';

  btn.classList.add('selected');
  buttons.forEach(b => b.disabled = true);

  if (rating === 'up') {
    const items = loadFeedbackData();
    items.push({
      type: 'message',
      rating: 'up',
      comment: '',
      messagePreview: preview,
      timestamp: Date.now()
    });
    saveFeedbackData(items);
    renderFeedback();
  } else {
    // Show optional text input
    const inputContainer = document.createElement('div');
    inputContainer.className = 'feedback-input-container';
    inputContainer.innerHTML = `
      <input type="text" placeholder="How could this response be better? (optional)" />
      <button onclick="submitDownFeedback(this)">Submit</button>`;
    container.after(inputContainer);
    const input = inputContainer.querySelector('input');
    input.focus();
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitDownFeedback(inputContainer.querySelector('button'));
      }
    });

    // Save immediately (user may not type anything)
    const items = loadFeedbackData();
    items.push({
      type: 'message',
      rating: 'down',
      comment: '',
      messagePreview: preview,
      timestamp: Date.now()
    });
    saveFeedbackData(items);
    renderFeedback();
  }
}

function submitDownFeedback(submitBtn) {
  const inputContainer = submitBtn.closest('.feedback-input-container');
  const input = inputContainer.querySelector('input');
  const comment = input.value.trim();

  if (comment) {
    // Update the last feedback entry with the comment
    const items = loadFeedbackData();
    if (items.length > 0) {
      items[items.length - 1].comment = comment;
      saveFeedbackData(items);
      renderFeedback();
    }
  }

  inputContainer.remove();
}

function renderFeedback() {
  const list = document.getElementById('feedbackList');
  const items = loadFeedbackData();

  if (items.length === 0) {
    list.innerHTML = '<div class="panel-empty" id="feedbackEmpty">No feedback yet.</div>';
    return;
  }

  list.innerHTML = '';
  // Show newest first
  const sorted = items.slice().reverse();
  sorted.forEach((item, ri) => {
    const i = items.length - 1 - ri; // real index in the original array
    const entry = document.createElement('div');
    entry.className = 'feedback-entry';

    let typeLabel, typeClass;
    if (item.type === 'regenerate') {
      typeLabel = '&#x1F504; Regenerated';
      typeClass = 'regenerate';
    } else if (item.type === 'system') {
      typeLabel = 'System';
      typeClass = 'system';
    } else if (item.rating === 'up') {
      typeLabel = '&#128077; Positive';
      typeClass = 'positive';
    } else {
      typeLabel = '&#128078; Negative';
      typeClass = 'negative';
    }

    const timeStr = formatNoteTime(item.timestamp);

    let bodyHtml = '';
    if (item.comment) {
      bodyHtml += `<div>${escapeHtml(item.comment)}</div>`;
    }
    if (item.messagePreview) {
      bodyHtml += `<div class="feedback-preview">"${escapeHtml(item.messagePreview)}${item.messagePreview.length >= 100 ? '...' : ''}"</div>`;
    }
    if (item.guidance) {
      bodyHtml += `<div class="feedback-preview" style="color:var(--accent)">Guidance: "${escapeHtml(item.guidance)}"</div>`;
    }
    if (item.original_response) {
      bodyHtml += `<div class="feedback-preview">Original: "${escapeHtml(item.original_response)}${item.original_response.length >= 150 ? '...' : ''}"</div>`;
    }
    if (!bodyHtml) {
      bodyHtml = item.type === 'system' ? '<div style="color:var(--text-muted)">No details</div>' : '';
    }

    entry.innerHTML = `
      <div class="feedback-header">
        <span class="feedback-type ${typeClass}">${typeLabel}</span>
        <span class="feedback-time">${timeStr}</span>
        <button class="feedback-delete" onclick="deleteFeedback(${i})" title="Delete feedback">&times;</button>
      </div>
      ${bodyHtml ? `<div class="feedback-body">${bodyHtml}</div>` : ''}
    `;
    list.appendChild(entry);
  });
}

function getRemindersKey() {
  // Reminders are global (not per-conversation) so commitments persist across chats
  return 'reminders-global';
}

function loadRemindersData() {
  try {
    const raw = localStorage.getItem(getRemindersKey());
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveRemindersData(reminders) {
  localStorage.setItem(getRemindersKey(), JSON.stringify(reminders));
}

function renderReminders() {
  const list = document.getElementById('remindersList');
  const reminders = loadRemindersData();

  if (reminders.length === 0) {
    list.innerHTML = '<div class="panel-empty" id="remindersEmpty">No reminders yet. Commitments and action items will appear here.</div>';
    return;
  }

  list.innerHTML = '';

  // Split into active and completed
  const active = [];
  const completed = [];
  reminders.forEach((r, i) => {
    (r.completed ? completed : active).push({ ...r, _idx: i });
  });

  // Render active reminders
  if (active.length > 0) {
    const label = document.createElement('div');
    label.className = 'reminders-section-label';
    label.textContent = `Active (${active.length})`;
    list.appendChild(label);
    active.forEach(r => list.appendChild(createReminderEntry(r)));
  }

  // Render completed reminders
  if (completed.length > 0) {
    const label = document.createElement('div');
    label.className = 'reminders-section-label';
    label.textContent = `Completed (${completed.length})`;
    list.appendChild(label);
    completed.forEach(r => list.appendChild(createReminderEntry(r)));
  }
}

function createReminderEntry(reminder) {
  const entry = document.createElement('div');
  entry.className = 'reminder-entry' + (reminder.completed ? ' completed' : '');

  const sourceLabel = reminder.source === 'commitment-radar' ? 'Commitment Radar' :
                      reminder.source === 'agent' ? 'Axari' : 'You';
  const sourceClass = reminder.source === 'commitment-radar' ? 'agent' :
                      reminder.source === 'agent' ? 'agent' : 'user';
  const timeStr = formatNoteTime(reminder.timestamp);

  let dueBadge = '';
  if (reminder.due) {
    const dueClass = getDueClass(reminder.due);
    const dueLabel = formatDueDate(reminder.due);
    dueBadge = `<span class="reminder-due ${dueClass}">${escapeHtml(dueLabel)}</span>`;
  }

  let contextHtml = '';
  if (reminder.context) {
    contextHtml = `<div class="reminder-context">${escapeHtml(reminder.context)}</div>`;
  }

  entry.innerHTML = `
    <div class="reminder-main">
      <div class="reminder-checkbox" onclick="toggleReminder(${reminder._idx})" title="${reminder.completed ? 'Mark incomplete' : 'Mark complete'}">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="reminder-content">
        <div class="reminder-title">${escapeHtml(reminder.title)}</div>
        <div class="reminder-meta">
          ${dueBadge}
          <span class="reminder-source ${sourceClass}">${sourceLabel}</span>
          <span class="reminder-time">${timeStr}</span>
        </div>
      </div>
      <div class="reminder-actions">
        <button class="reminder-delete" onclick="deleteReminder(${reminder._idx})" title="Delete">&times;</button>
      </div>
    </div>
    ${contextHtml}
  `;
  return entry;
}

function getDueClass(dueStr) {
  try {
    const due = new Date(dueStr + 'T23:59:59');
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);

    if (due < today) return 'overdue';
    if (due < tomorrow) return 'today';
    return 'upcoming';
  } catch {
    return '';
  }
}

function formatDueDate(dueStr) {
  try {
    const due = new Date(dueStr + 'T12:00:00');
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const dueDay = new Date(due.getFullYear(), due.getMonth(), due.getDate());

    if (dueDay.getTime() === today.getTime()) return 'Due today';
    if (dueDay.getTime() === tomorrow.getTime()) return 'Due tomorrow';
    if (dueDay < today) {
      const days = Math.floor((today - dueDay) / 86400000);
      return `Overdue by ${days}d`;
    }
    return 'Due ' + due.toLocaleDateString([], { month: 'short', day: 'numeric' });
  } catch {
    return dueStr;
  }
}

function syncDashboardCommitments(suggestions) {
  // Sync commitment radar suggestions into the reminders panel.
  // Replaces all previous commitment-radar entries with the latest set
  // to avoid near-duplicates caused by differently-worded LLM outputs.
  if (!Array.isArray(suggestions) || suggestions.length === 0) return;

  const reminders = loadRemindersData();

  // Remove old commitment-radar entries (keep user-added and agent reminders)
  const kept = reminders.filter(r => r.source !== 'commitment-radar');

  // Build dedup set from kept items to avoid clashing with manually-added reminders
  const existingTitles = new Set(kept.map(r => r.title.toLowerCase().trim()));

  for (const s of suggestions) {
    const title = (s.title || '').trim();
    if (!title) continue;
    if (existingTitles.has(title.toLowerCase())) continue;

    kept.push({
      title,
      due: s.due_date || '',
      context: [s.observation, s.description].filter(Boolean).join(' — ') || '',
      source: 'commitment-radar',
      completed: false,
      timestamp: Date.now(),
      importance: s.importance || '',
    });
    existingTitles.add(title.toLowerCase());
  }

  saveRemindersData(kept);
  renderReminders();
}

// Accumulated streamed response text (reset per message)
let streamedResponseText = '';

async function sendMessage(opts = {}) {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  // Handle /feedback command
  if (text.startsWith('/feedback ')) {
    const feedbackText = text.slice('/feedback '.length).trim();
    if (feedbackText) {
      input.value = '';
      input.style.height = 'auto';

      addUserMessage(text);

      const items = loadFeedbackData();
      items.push({ type: 'system', comment: feedbackText, timestamp: Date.now() });
      saveFeedbackData(items);
      renderFeedback();

      // Show confirmation in chat
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.innerHTML = `<div class="message-row">
          <img class="assistant-avatar" src="/static/atlas-circle.svg" alt="Atlas" onerror="this.style.display='none'" />
          <div class="message-content">
            <span class="message-label">Atlas</span>
            <div class="message-bubble">Thanks for your feedback!</div>
          </div>
        </div>`;
      msgs.appendChild(div);
      scrollToBottom();

      // Open Brain panel to Feedback tab
      openPanel('feedback');
    }
    return;
  }

  isStreaming = true;
  streamedResponseText = '';
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  trackBehavior('chat_message', text.slice(0, 100));
  if (!opts.skipUserMessage) addUserMessage(text);
  createAssistantMessage();
  showStopButton();

  currentAbortController = new AbortController();

  const allowedToolsRaw = document.getElementById('allowedTools').value.trim();
  const allowedTools = allowedToolsRaw
    ? allowedToolsRaw.split(',').map(s => s.trim()).filter(Boolean)
    : [];

  const body = {
    message: text,
    conversation_id: conversationId,
    tenant_id: document.getElementById('tenantId').value,
    user_id: document.getElementById('userId').value,
    user_name: document.getElementById('userName').value,
    org_name: document.getElementById('orgName').value,
    user_timezone: document.getElementById('userTimezone').value,
    allowed_tools: allowedTools,
  };

  let responseText = '';
  let trajectory = [];
  let tokenUsage = {};

  try {
    const res = await fetch(STREAM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: currentAbortController.signal,
    });

    if (!res.ok) {
      const err = await res.text();
      addErrorMessage(`HTTP ${res.status}: ${err}`);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();  // keep incomplete line in buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();

        if (payload === '[DONE]') continue;

        try {
          const event = JSON.parse(payload);

          switch (event.type) {
            case 'thinking':
              if (event.data?.text) {
                appendThinkingChunk(event.data.text);
              }
              break;

            case 'node_planner':
              if (event.data?.planning_steps) {
                const label = document.getElementById('thinkingLabel');
                // Clear thinking stream when tool calls start
                const stream = document.getElementById('thinkingStream');
                if (stream) stream.textContent = '';
                for (const step of event.data.planning_steps) {
                  const goal = step.goal || step['step name'] || 'Working...';
                  addThinkingStep(goal);
                  if (label) label.textContent = goal;
                }
              }
              break;

            case 'tool_result':
              // Full tool result for the detail panel
              if (event.data) {
                addToolResultCard(event.data);
              }
              break;

            case 'panel_note':
              // Agent wrote notes to the Notes tab
              if (event.data) {
                handlePanelNote(event.data);
              }
              break;

            case 'reminder':
              // Agent added a reminder/commitment
              if (event.data) {
                handleReminder(event.data);
              }
              break;

            case 'response_chunk':
              // Stream text token-by-token into the UI
              appendResponseChunk(event.data?.text || '');
              break;

            case 'response_clear':
              // Tool calls detected -- clear partial response, show thinking
              clearStreamingResponse();
              break;

            case 'response':
              // Full response (end marker) -- use streamed text if available
              responseText = event.data?.text || '';
              break;

            case 'trajectory':
              trajectory = event.data || [];
              break;

            case 'token_usage':
              tokenUsage = event.data || {};
              break;

            case 'error':
              addErrorMessage(event.data?.detail || 'Unknown error');
              return;
          }
        } catch (e) {
          // Skip unparseable lines
        }
      }
    }

    if (streamedResponseText || responseText) {
      finalizeAssistantMessage(responseText, trajectory, tokenUsage);
    } else {
      addErrorMessage('No response received from agent.');
    }

  } catch (err) {
    if (err.name === 'AbortError') {
      // User stopped the stream — keep partial response
      if (streamedResponseText) {
        streamedResponseText += '\n\n*[Response stopped]*';
        const bubble = document.getElementById('streamingBubble');
        if (bubble) bubble.innerHTML = marked.parse(streamedResponseText);
        finalizeAssistantMessage('', trajectory, tokenUsage);
      } else {
        addErrorMessage('Response stopped by user.');
      }
    } else {
      addErrorMessage(err.message || 'Connection failed');
    }
  } finally {
    isStreaming = false;
    streamedResponseText = '';
    currentAbortController = null;
    hideStopButton();
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }
}

async function executeResponsibility(id, name) {
  // Disable the Run button to prevent double-clicks
  const runBtn = document.getElementById('resp-run-' + id);
  if (runBtn) {
    runBtn.disabled = true;
    runBtn.textContent = 'Running...';
  }

  const body = {
    tenant_id: document.getElementById('tenantId').value,
    responsibility_id: id,
    user_id: document.getElementById('userId').value,
    user_name: document.getElementById('userName').value,
    org_name: document.getElementById('orgName').value,
    user_timezone: document.getElementById('userTimezone').value,
  };

  try {
    const res = await fetch('/v1/responsibilities/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.text();
      showResponsibilityToast(name, `Failed to start: ${err}`, true);
      if (runBtn) { runBtn.disabled = false; runBtn.textContent = 'Run'; }
      return;
    }

    const data = await res.json();
    const executionId = data.execution_id;

    // Show "started" toast
    showResponsibilityToast(name, 'Execution started. You will be notified when it completes.', false);

    // Start polling for completion
    pollResponsibilityExecution(executionId, name, id);

  } catch (err) {
    showResponsibilityToast(name, err.message || 'Connection failed', true);
    if (runBtn) { runBtn.disabled = false; runBtn.textContent = 'Run'; }
  }
}

function pollResponsibilityExecution(executionId, playbookName, responsibilityId) {
  const POLL_INTERVAL = 3000;

  const intervalId = setInterval(async () => {
    try {
      const res = await fetch(`/v1/responsibilities/execution/${encodeURIComponent(executionId)}`);
      if (!res.ok) return;

      const data = await res.json();

      if (data.status === 'completed') {
        clearInterval(intervalId);
        _responsibilityPolls.delete(executionId);

        // Re-enable the Run button
        const runBtn = document.getElementById('resp-run-' + responsibilityId);
        if (runBtn) { runBtn.disabled = false; runBtn.textContent = 'Run'; }

        // Show completion notification with "View Results" action
        showResponsibilityCompletionToast(executionId, playbookName);

        // Refresh dashboard to show new results
        loadDashboard();

      } else if (data.status === 'failed') {
        clearInterval(intervalId);
        _responsibilityPolls.delete(executionId);

        const runBtn = document.getElementById('resp-run-' + responsibilityId);
        if (runBtn) { runBtn.disabled = false; runBtn.textContent = 'Run'; }

        showResponsibilityToast(playbookName, data.error || 'Execution failed', true);
      }
      // else still running — keep polling

    } catch (_) { /* ignore fetch errors, retry next interval */ }
  }, POLL_INTERVAL);

  _responsibilityPolls.set(executionId, intervalId);
}

function renderExecutionResult(data) {
  const thinking = document.getElementById('execThinking');
  if (thinking) thinking.remove();

  const body = document.getElementById('execModalBody');

  if (data.status === 'failed') {
    body.innerHTML = `<div style="color:var(--error)">${escapeHtml(data.error || 'Execution failed')}</div>`;
    return;
  }

  // Render response
  body.innerHTML = marked.parse(data.response || '*No response*');

  // Render trajectory
  const trajectory = data.trajectory || [];
  if (trajectory.length > 0) {
    const trajId = 'exec-traj-' + Date.now();
    const trajDiv = document.createElement('div');
    trajDiv.className = 'exec-modal-trajectory';
    trajDiv.innerHTML = `
      <div class="trajectory-toggle" onclick="toggleTrajectory('${trajId}', this)">

      <div class="trajectory-panel" id="${trajId}">
        ${trajectory.map(t => `
          <div class="trajectory-step">
            <div><span class="tool-name">${escapeHtml(t.tool || '')}</span></div>
            ${t.thought ? `<div style="color:#8b8fa3;margin-top:2px">${escapeHtml(t.thought.slice(0,200))}</div>` : ''}
            ${t.observation ? `<div class="observation">${escapeHtml(t.observation.slice(0,300))}</div>` : ''}
          </div>`).join('')}
      </div>`;
    body.appendChild(trajDiv);
  }

  // Render token usage / stats in footer
  const tokenUsage = data.token_usage || {};
  if (tokenUsage.input || tokenUsage.output) {
    const footer = document.getElementById('execModalFooter');
    const elapsed = tokenUsage.elapsed_seconds;
    const timeStr = elapsed >= 60
      ? `${Math.floor(elapsed / 60)}m ${(elapsed % 60).toFixed(1)}s`
      : `${elapsed}s`;
    footer.innerHTML = `
      <div class="token-info">
        <span>In: ${(tokenUsage.input || 0).toLocaleString()}</span>
        <span>Out: ${(tokenUsage.output || 0).toLocaleString()}</span>
        ${elapsed != null ? `<span>Time: ${timeStr}</span>` : ''}
      </div>`;
    footer.style.display = 'block';
  }
}

async function viewExecutionResult(executionId, playbookName) {

      if (thinking) thinking.remove();
      document.getElementById('execModalBody').innerHTML =
        `<div style="color:var(--error)">Failed to load results (HTTP ${res.status})</div>`;
      return;
    }
    renderExecutionResult(await res.json());
  } catch (err) {
    const thinking = document.getElementById('execThinking');
    if (thinking) thinking.remove();
    document.getElementById('execModalBody').innerHTML =
      `<div style="color:var(--error)">${escapeHtml(err.message || 'Connection failed')}</div>`;
  }
}

async function viewResponsibilityResult(responsibilityId, playbookName) {
  openResultsModal(playbookName);

  try {
    const res = await fetch(`/v1/responsibilities/${encodeURIComponent(responsibilityId)}/result`);

    const thinking = document.getElementById('execThinking');
    if (thinking) thinking.remove();

    if (res.status === 404) {
      document.getElementById('execModalBody').innerHTML =
        '<div class="panel-empty">No execution results yet. Click <strong>Run</strong> to execute this responsibility.</div>';
      return;
    }

    if (!res.ok) {
      document.getElementById('execModalBody').innerHTML =
        `<div style="color:var(--error)">Failed to load results (HTTP ${res.status})</div>`;
      return;
    }

    const data = await res.json();
    // Reuse the same rendering as viewExecutionResult
    renderExecutionResult(data);

  } catch (err) {
    const thinking = document.getElementById('execThinking');
    if (thinking) thinking.remove();
    document.getElementById('execModalBody').innerHTML =
      `<div style="color:var(--error)">${escapeHtml(err.message || 'Connection failed')}</div>`;
  }
}

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('execModal').style.display !== 'none') {
    closeExecutionModal();
  }
});
</script>
