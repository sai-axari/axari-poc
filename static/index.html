<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axari POC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22252f;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-muted: #8b8fa3;
    --accent: #33CAFF;
    --accent-dim: rgba(51,202,255,0.12);
    --accent-purple: #9850FF;
    --accent-purple-dim: rgba(152,80,255,0.12);
    --accent-gradient: linear-gradient(135deg, #33CAFF, #9850FF);
    --user-bg: #2a3a5c;
    --error: #ff6b6b;
    --thinking-bg: rgba(51,202,255,0.06);
    --radius: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    --header-height: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo {
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .header-actions button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .header-actions button:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .header-actions button.panel-active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Main area — flex row for chat + detail panel */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-height: 0;
  }

  /* Chat column */
  .chat-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    transition: flex 0.25s ease;
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .messages {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .message.user { align-items: flex-end; }
  .message.assistant { align-items: flex-start; }

  .message-label {
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 4px;
    font-weight: 500;
  }

  .message-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .message.user .message-bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 3px;
  }
  .message.assistant .message-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
    width: fit-content;
  }

  /* Markdown inside messages */
  .message-bubble h1, .message-bubble h2, .message-bubble h3 {
    margin: 12px 0 6px 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .message-bubble h1:first-child, .message-bubble h2:first-child, .message-bubble h3:first-child {
    margin-top: 0;
  }
  .message-bubble p { margin: 6px 0; }
  .message-bubble p:first-child { margin-top: 0; }
  .message-bubble p:last-child { margin-bottom: 0; }
  .message-bubble ul, .message-bubble ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .message-bubble li { margin: 3px 0; }
  .message-bubble strong { color: #fff; }
  .message-bubble code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .message-bubble pre {
    background: rgba(0,0,0,0.3);
    padding: 10px 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .message-bubble pre code {
    background: none;
    padding: 0;
    font-size: 12px;
  }
  .message-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text-muted);
  }
  .message-bubble a {
    color: var(--accent);
    text-decoration: none;
  }
  .message-bubble a:hover { text-decoration: underline; }

  /* Thinking indicator */
  .thinking-indicator {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .thinking-box {
    background: var(--thinking-bg);
    border: 1px solid rgba(51,202,255,0.15);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.2s ease;
  }
  .thinking-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(51,202,255,0.25);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .thinking-stream {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 200px;
    overflow-y: auto;
    font-family: var(--mono);
    scrollbar-width: thin;
  }
  .thinking-stream::-webkit-scrollbar { width: 4px; }
  .thinking-stream::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .thinking-steps {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-left: 22px;
  }
  .thinking-step {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }

  /* Trajectory panel */
  .trajectory-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 0;
    margin-top: 4px;
    user-select: none;
  }
  .trajectory-toggle:hover { color: var(--accent); }
  .trajectory-toggle .arrow {
    font-size: 8px;
    transition: transform 0.2s;
  }
  .trajectory-toggle.open .arrow { transform: rotate(90deg); }
  .trajectory-panel {
    display: none;
    margin-top: 6px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    max-height: 300px;
    overflow-y: auto;
  }
  .trajectory-panel.open { display: block; }
  .trajectory-step {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .trajectory-step:last-child { border-bottom: none; }
  .trajectory-step .tool-name { color: var(--accent); font-weight: 500; }
  .trajectory-step .observation {
    color: var(--text-muted);
    margin-top: 3px;
    white-space: pre-wrap;
    max-height: 80px;
    overflow: hidden;
  }

  /* Token usage */
  .token-info {
    font-size: 11px;
    color: var(--text-muted);
    padding: 2px 4px;
    display: flex;
    gap: 12px;
  }

  /* Dashboard / empty state */
  .dashboard {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .dash-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .dash-header h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .dash-header .dash-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Horizontal grid for the three playbook sections */
  .dash-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 900px) {
    .dash-grid {
      grid-template-columns: 1fr;
    }
  }

  .dash-section {
    animation: fadeIn 0.3s ease;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .dash-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .dash-section-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .dash-section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }
  .dash-section-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .dash-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .dash-card + .dash-card {
    margin-top: 0;
  }
  .dash-card p { margin: 4px 0; }
  .dash-card p:first-child { margin-top: 0; }
  .dash-card p:last-child { margin-bottom: 0; }
  .dash-card ul, .dash-card ol { padding-left: 18px; margin: 4px 0; }
  .dash-card li { margin: 2px 0; }
  .dash-card strong { color: #fff; }
  .dash-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 6px 0;
    color: var(--text);
  }

  /* Commitment items */
  .dash-commitment {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .dash-commitment:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
  }
  .dash-commitment + .dash-commitment {
    margin-top: 0;
  }
  .dash-commitment-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dash-commitment-dot.high { background: var(--error); }
  .dash-commitment-dot.medium { background: #ffd54f; }
  .dash-commitment-body {
    flex: 1;
    min-width: 0;
  }
  .dash-commitment-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .dash-commitment-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Commitment detail popup */
  .commitment-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fade-in 0.15s ease-out;
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .commitment-popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    animation: popup-scale 0.2s ease-out;
  }
  @keyframes popup-scale {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .commitment-popup-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .commitment-popup-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .commitment-popup-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .commitment-popup-close:hover { color: var(--text); }
  .commitment-popup-badges {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .commitment-popup-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 6px;
    font-weight: 500;
  }
  .commitment-popup-badge.importance {
    background: rgba(255,213,79,0.15);
    color: #ffd54f;
  }
  .commitment-popup-badge.importance.high {
    background: rgba(255,107,107,0.15);
    color: var(--error);
  }
  .commitment-popup-badge.type {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .commitment-popup-badge.due {
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
  }
  .commitment-popup-section {
    margin-top: 12px;
  }
  .commitment-popup-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .commitment-popup-section-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .commitment-empty-state {
    text-align: center;
    padding: 20px 16px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.5;
  }
  .commitment-empty-icon {
    font-size: 24px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  /* Priority items (morning brief) */
  .dash-priority {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .dash-priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dash-priority-body {
    flex: 1;
    min-width: 0;
  }
  .dash-priority-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .dash-priority-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* Meeting items */
  .dash-meeting {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .dash-meeting:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }
  .dash-meeting-time {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    min-width: 60px;
    padding-top: 1px;
  }
  .dash-meeting-body {
    flex: 1;
    min-width: 0;
  }
  .dash-meeting-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .dash-meeting-attendees {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .dash-meeting-link-icon {
    flex-shrink: 0;
    margin-top: 3px;
    color: var(--text-muted);
    transition: color 0.15s;
  }
  .dash-meeting:hover .dash-meeting-link-icon {
    color: var(--accent);
  }

  /* Dashboard loading & empty */
  .dash-loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .dash-empty {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }

  /* Quick actions row */
  .dash-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .dash-action {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    font-family: var(--font);
  }
  .dash-action:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--surface-hover);
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 20px;
    flex-shrink: 0;
  }
  .input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrapper textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-wrapper textarea:focus {
    border-color: var(--accent);
  }
  .input-wrapper textarea::placeholder {
    color: var(--text-muted);
  }
  .send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: #fff;
  }

  /* Settings panel */
  .settings-panel {
    display: none;
    position: absolute;
    top: var(--header-height);
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    z-index: 10;
    min-width: 280px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .settings-panel.open { display: block; }
  .settings-panel label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
    margin-top: 10px;
  }
  .settings-panel label:first-child { margin-top: 0; }
  .settings-panel input, .settings-panel select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font);
    outline: none;
  }
  .settings-panel input:focus, .settings-panel select:focus {
    border-color: var(--accent);
  }

  /* Error message */
  .error-bubble {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--error);
  }

  /* ==================== Detail Panel ==================== */
  .detail-panel {
    width: 540px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    margin-right: -540px;
    transition: transform 0.25s ease, margin-right 0.25s ease;
    overflow: hidden;
  }
  .detail-panel.open {
    transform: translateX(0);
    margin-right: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-tabs {
    display: flex;
    gap: 4px;
  }
  .panel-tab {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .panel-tab:hover {
    color: var(--text);
  }
  .panel-tab.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .panel-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .panel-close:hover {
    color: var(--text);
  }

  .panel-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-tab-content {
    display: none;
    flex: 1;
    overflow-y: auto;
    flex-direction: column;
  }
  .panel-tab-content.active {
    display: flex;
  }

  /* Data tab */
  .data-cards {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .panel-empty {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
    line-height: 1.6;
  }

  .data-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }
  .data-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    background: var(--bg);
    transition: background 0.15s;
    user-select: none;
  }
  .data-card-header:hover {
    background: var(--surface-hover);
  }
  .data-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }
  .data-card-arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .data-card.expanded .data-card-arrow {
    transform: rotate(90deg);
  }
  .data-card-body {
    display: none;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.6;
    border-top: 1px solid var(--border);
    max-height: 500px;
    overflow-y: auto;
    background: var(--bg);
  }
  .data-card.expanded .data-card-body {
    display: block;
  }
  .data-card-body pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin: 0;
  }
  .data-card-body::-webkit-scrollbar { width: 4px; }
  .data-card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Structured data rendering */
  .struct-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .struct-table td {
    padding: 4px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: top;
  }
  .struct-table td:first-child {
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    width: 1%;
    padding-right: 16px;
  }
  .struct-table td:last-child {
    color: var(--text);
    word-break: break-word;
  }
  .struct-item {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .struct-item-header {
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .struct-item-header:hover { background: rgba(255,255,255,0.06); }
  .struct-item-header .arrow {
    font-size: 8px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .struct-item.expanded .struct-item-header .arrow {
    transform: rotate(90deg);
  }
  .struct-item-body {
    display: none;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .struct-item.expanded .struct-item-body {
    display: block;
  }
  .show-more-toggle {
    color: var(--accent);
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    margin-top: 4px;
    display: inline-block;
  }
  .show-more-toggle:hover { text-decoration: underline; }
  .long-value-full { display: none; }
  .long-value-full.visible { display: inline; }
  .long-value-preview.hidden { display: none; }

  /* Notes tab */
  #notesTab {
    padding: 0;
    overflow: hidden;
  }
  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .notes-list::-webkit-scrollbar { width: 4px; }
  .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .note-entry {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }
  .note-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .note-source {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .note-source.agent {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .note-source.user {
    background: rgba(76,175,80,0.12);
    color: #81c784;
  }
  .note-time {
    font-size: 11px;
    color: var(--text-muted);
    flex: 1;
  }
  .note-delete {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    opacity: 0;
  }
  .note-entry:hover .note-delete {
    opacity: 1;
  }
  .note-delete:hover {
    color: var(--error);
  }
  .note-body {
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    word-wrap: break-word;
    overflow-wrap: break-word;
    max-height: 5.6em;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .note-body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .note-body.truncated::after {
    opacity: 1;
  }
  .note-body p { margin: 4px 0; }
  .note-body p:first-child { margin-top: 0; }
  .note-body p:last-child { margin-bottom: 0; }
  .note-body ul, .note-body ol { padding-left: 18px; margin: 4px 0; }
  .note-body li { margin: 2px 0; }
  .note-body strong { color: #fff; }
  .note-body code {
    background: rgba(255,255,255,0.08);
    padding: 1px 4px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .note-body h1, .note-body h2, .note-body h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 8px 0 4px 0;
    color: var(--text);
  }
  .note-body h1:first-child, .note-body h2:first-child, .note-body h3:first-child {
    margin-top: 0;
  }

  /* Notes home view */
  .notes-home {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .notes-trigger {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 12px;
    background: var(--surface);
    cursor: text;
  }
  .notes-trigger-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font);
    transition: border-color 0.15s;
  }
  .notes-trigger-box:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Notes editor view */
  .notes-editor {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .notes-editor.active {
    display: flex;
  }
  .notes-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .notes-editor-header button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    transition: all 0.15s;
  }
  .notes-editor-header button:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .notes-editor-header .save-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .notes-editor-header .save-btn:hover {
    opacity: 0.85;
    color: #fff;
  }
  .notes-editor textarea {
    flex: 1;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: none;
    padding: 16px;
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    outline: none;
  }
  .notes-editor textarea::placeholder {
    color: var(--text-muted);
  }

  /* Notes detail viewer */
  .notes-viewer {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .notes-viewer.active {
    display: flex;
  }
  .notes-viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .notes-viewer-header button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    transition: all 0.15s;
  }
  .notes-viewer-header button:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .notes-viewer-header .delete-btn {
    color: var(--error);
    border-color: var(--error);
    opacity: 0.7;
  }
  .notes-viewer-header .delete-btn:hover {
    opacity: 1;
  }
  .notes-viewer-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .notes-viewer-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .notes-viewer-content::-webkit-scrollbar { width: 4px; }
  .notes-viewer-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .notes-viewer-content p { margin: 6px 0; }
  .notes-viewer-content p:first-child { margin-top: 0; }
  .notes-viewer-content ul, .notes-viewer-content ol { padding-left: 18px; margin: 6px 0; }
  .notes-viewer-content li { margin: 3px 0; }
  .notes-viewer-content strong { color: #fff; }
  .notes-viewer-content code {
    background: rgba(255,255,255,0.08);
    padding: 1px 4px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .notes-viewer-content h1, .notes-viewer-content h2, .notes-viewer-content h3 {
    font-size: 15px;
    font-weight: 600;
    margin: 12px 0 6px 0;
    color: var(--text);
  }
  .notes-viewer-content h1:first-child, .notes-viewer-content h2:first-child, .notes-viewer-content h3:first-child {
    margin-top: 0;
  }

  /* ==================== Feedback components ==================== */
  .feedback-actions {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    padding: 2px 0;
  }
  .feedback-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    padding: 3px 8px;
    font-size: 14px;
    opacity: 0.5;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s;
  }
  .feedback-btn:hover {
    opacity: 1;
    background: var(--surface-hover);
    border-color: var(--border);
  }
  .feedback-btn.selected {
    opacity: 1;
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .feedback-btn:disabled {
    cursor: default;
  }
  .feedback-btn:disabled:not(.selected) {
    opacity: 0.25;
  }
  .feedback-input-container {
    margin-top: 6px;
    display: flex;
    gap: 6px;
    align-items: flex-start;
    animation: fadeIn 0.2s ease;
  }
  .feedback-input-container input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font);
    outline: none;
  }
  .feedback-input-container input:focus {
    border-color: var(--accent);
  }
  .feedback-input-container button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .feedback-input-container button:hover {
    opacity: 0.85;
  }
  .feedback-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .feedback-list::-webkit-scrollbar { width: 4px; }
  .feedback-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .feedback-entry {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }
  .feedback-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .feedback-type {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .feedback-type.positive {
    background: rgba(76,175,80,0.12);
    color: #81c784;
  }
  .feedback-type.negative {
    background: rgba(255,107,107,0.12);
    color: #ff6b6b;
  }
  .feedback-type.system {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .feedback-type.regenerate {
    background: rgba(255,193,7,0.12);
    color: #ffd54f;
  }
  .feedback-time {
    font-size: 11px;
    color: var(--text-muted);
    flex: 1;
  }
  .feedback-delete {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    opacity: 0;
  }
  .feedback-entry:hover .feedback-delete {
    opacity: 1;
  }
  .feedback-delete:hover {
    color: var(--error);
  }
  .feedback-body {
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .feedback-body .feedback-preview {
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
    margin-top: 4px;
  }

  /* ==================== Playbook execution card ==================== */
  .playbook-exec-card {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
    color: var(--text);
  }
  .playbook-exec-card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
  }
  .playbook-exec-card-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
  }
  .playbook-exec-card-body {
    flex: 1;
    min-width: 0;
  }
  .playbook-exec-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .playbook-exec-card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .playbook-exec-card-arrow {
    color: var(--text-muted);
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .playbook-exec-card:hover .playbook-exec-card-arrow {
    transform: translateX(2px);
    color: var(--accent);
  }

  /* ==================== Execution notification toast ==================== */
  .notification-toast-container {
    position: fixed;
    top: 60px;
    right: 20px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  .notification-toast {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    min-width: 320px;
    max-width: 420px;
    pointer-events: auto;
    animation: toast-slide-in 0.35s ease-out;
  }
  .notification-toast.toast-exit {
    animation: toast-slide-out 0.3s ease-in forwards;
  }
  .notification-toast.toast-error {
    border-color: var(--error);
  }
  @keyframes toast-slide-in {
    from { opacity: 0; transform: translateX(60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes toast-slide-out {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(60px); }
  }
  .notification-toast-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 16px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .notification-toast.toast-error .notification-toast-icon {
    background: rgba(255,107,107,0.12);
    color: var(--error);
  }
  .notification-toast-body {
    flex: 1;
    min-width: 0;
  }
  .notification-toast-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .notification-toast-message {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .notification-toast-actions {
    margin-top: 8px;
  }
  .notification-toast-actions a {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    padding: 4px 12px;
    border-radius: 6px;
    background: var(--accent-dim);
    transition: background 0.15s;
  }
  .notification-toast-actions a:hover {
    background: rgba(51,202,255,0.22);
  }
  .notification-toast-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .notification-toast-close:hover {
    color: var(--text);
  }

  /* ==================== Reminders tab ==================== */
  #remindersTab {
    padding: 0;
    overflow: hidden;
  }
  .reminders-home {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .reminders-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .reminders-list::-webkit-scrollbar { width: 4px; }
  .reminders-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .reminders-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 0 4px 0;
  }
  .reminders-section-label:first-child { padding-top: 0; }

  .reminder-entry {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
    transition: opacity 0.2s;
  }
  .reminder-entry.completed {
    opacity: 0.5;
  }
  .reminder-main {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
  }
  .reminder-checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
    background: transparent;
  }
  .reminder-checkbox:hover {
    border-color: var(--accent);
  }
  .reminder-entry.completed .reminder-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .reminder-checkbox svg {
    width: 12px;
    height: 12px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    display: none;
  }
  .reminder-entry.completed .reminder-checkbox svg {
    display: block;
  }
  .reminder-content {
    flex: 1;
    min-width: 0;
  }
  .reminder-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    word-wrap: break-word;
  }
  .reminder-entry.completed .reminder-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .reminder-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .reminder-due {
    font-size: 11px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
  }
  .reminder-due.overdue {
    background: rgba(255,107,107,0.12);
    color: var(--error);
  }
  .reminder-due.today {
    background: rgba(255,193,7,0.12);
    color: #ffd54f;
  }
  .reminder-due.upcoming {
    background: rgba(76,175,80,0.12);
    color: #81c784;
  }
  .reminder-source {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .reminder-source.agent {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .reminder-source.user {
    background: rgba(76,175,80,0.12);
    color: #81c784;
  }
  .reminder-time {
    font-size: 11px;
    color: var(--text-muted);
  }
  .reminder-context {
    padding: 0 12px 10px 40px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .reminder-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .reminder-delete {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    opacity: 0;
  }
  .reminder-entry:hover .reminder-delete {
    opacity: 1;
  }
  .reminder-delete:hover {
    color: var(--error);
  }

  .reminders-trigger {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 12px;
    background: var(--surface);
    cursor: text;
  }
  .reminders-trigger-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font);
    transition: border-color 0.15s;
  }
  .reminders-trigger-box:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Reminder editor view */
  .reminder-editor {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .reminder-editor.active {
    display: flex;
  }
  .reminder-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .reminder-editor-header button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    transition: all 0.15s;
  }
  .reminder-editor-header button:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .reminder-editor-header .save-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .reminder-editor-header .save-btn:hover {
    opacity: 0.85;
    color: #fff;
  }
  .reminder-editor-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .reminder-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .reminder-field input,
  .reminder-field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }
  .reminder-field input:focus,
  .reminder-field textarea:focus {
    border-color: var(--accent);
  }
  .reminder-field input::placeholder,
  .reminder-field textarea::placeholder {
    color: var(--text-muted);
  }
  .reminder-field textarea {
    resize: none;
    min-height: 80px;
  }

  /* Panel backdrop for narrow screens */
  .panel-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    top: var(--header-height);
    background: rgba(0,0,0,0.5);
    z-index: 19;
  }
  .panel-backdrop.visible {
    display: block;
  }

  /* Responsive: narrow screens — overlay mode */
  @media (max-width: 1200px) {
    .detail-panel {
      position: fixed;
      right: 0;
      top: var(--header-height);
      bottom: 0;
      z-index: 20;
      margin-right: 0;
      width: min(540px, 90vw);
    }
    .detail-panel.open {
      transform: translateX(0);
    }
  }

  /* Behavior nudge cards */
  .dash-nudges {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .dash-nudge {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(51,202,255,0.06);
    border: 1px solid rgba(51,202,255,0.18);
    border-radius: var(--radius);
    animation: fadeIn 0.3s ease;
  }
  .dash-nudge-icon {
    font-size: 16px;
    flex-shrink: 0;
  }
  .dash-nudge-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }
  .dash-nudge-action {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .dash-nudge-action:hover { opacity: 0.85; }
  .dash-nudge-dismiss {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .dash-nudge-dismiss:hover { color: var(--text); }

  /* Dashboard glassmorphism */
  .dash-card,
  .dash-commitment,
  .dash-priority,
  .dash-meeting {
    background: rgba(26,29,39,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-color: rgba(42,45,58,0.6);
  }
  .dash-commitment:hover,
  .dash-meeting:hover {
    transform: translateY(-1px);
  }
  .dash-header h2 {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Send button gradient */
  .send-btn {
    background: var(--accent-gradient);
  }

  /* Textarea focus glow */
  .input-wrapper textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(51,202,255,0.15);
  }

  /* Assistant message with avatar */
  .message.assistant {
    width: 100%;
  }
  .message-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
  }
  .assistant-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    object-fit: cover;
  }
  .message-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    flex: 1;
  }

  /* User message actions */
  .message-bubble-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .message-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .message.user:hover .message-actions {
    opacity: 1;
  }
  .msg-action-btn {
    width: 28px;
    height: 28px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    padding: 0;
  }
  .msg-action-btn:hover {
    background: var(--surface-hover);
    border-color: var(--border);
    color: var(--text);
  }
  .regenerate-btn {
    opacity: 0.5;
    margin-left: 4px;
    position: relative;
  }
  .regenerate-btn:hover {
    opacity: 1;
  }

  /* Regenerate guidance popup */
  .feedback-actions {
    position: relative;
  }
  .regen-popup {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 100;
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.2s ease;
  }
  .regen-popup::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 24px;
    border: 6px solid transparent;
    border-bottom-color: var(--border);
  }
  .regen-popup-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .regen-popup input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 12px;
    font-family: var(--font);
    outline: none;
  }
  .regen-popup input:focus {
    border-color: var(--accent);
  }
  .regen-popup-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .regen-popup-actions button {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .regen-popup-actions button:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .regen-popup-actions button.regen-submit {
    background: var(--accent-gradient);
    border-color: transparent;
    color: #fff;
  }
  .regen-popup-actions button.regen-submit:hover {
    opacity: 0.85;
  }
  .msg-action-btn svg {
    width: 14px;
    height: 14px;
  }

  /* Stop button */
  .stop-btn {
    width: 42px;
    height: 42px;
    background: var(--error);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .stop-btn:hover { opacity: 0.85; }
  .stop-btn svg {
    width: 18px;
    height: 18px;
    fill: #fff;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ==================== Responsibilities Tab ==================== */
  .responsibilities-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .responsibility-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .responsibility-card:hover {
    border-color: rgba(51,202,255,0.3);
  }
  .responsibility-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .responsibility-card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .responsibility-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .responsibility-status.active {
    background: rgba(76,175,80,0.15);
    color: #66bb6a;
  }
  .responsibility-status.inactive,
  .responsibility-status.draft {
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
  }
  .responsibility-card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .responsibility-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .responsibility-worker {
    font-size: 11px;
    color: var(--text-muted);
  }
  .responsibility-run-btn {
    background: var(--accent-gradient);
    border: none;
    color: #fff;
    padding: 5px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .responsibility-run-btn:hover { opacity: 0.85; }
  .responsibility-run-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ==================== Execution Modal ==================== */
  .exec-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fade-in 0.15s ease-out;
  }
  .exec-modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 700px;
    width: 92%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    animation: popup-scale 0.2s ease-out;
  }
  .exec-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .exec-modal-header h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .exec-modal-header .exec-modal-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--accent-purple-dim);
    color: var(--accent-purple);
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-left: 8px;
  }
  .exec-modal-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .exec-modal-stop-btn {
    background: var(--error);
    border: none;
    color: #fff;
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 11px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .exec-modal-stop-btn:hover { opacity: 0.85; }
  .exec-modal-close-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .exec-modal-close-btn:hover { color: var(--text); }
  .exec-modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }
  .exec-modal-body::-webkit-scrollbar { width: 6px; }
  .exec-modal-body::-webkit-scrollbar-track { background: transparent; }
  .exec-modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  /* Markdown inside modal */
  .exec-modal-body h1, .exec-modal-body h2, .exec-modal-body h3 {
    margin: 12px 0 6px 0; font-size: 15px; font-weight: 600; color: var(--text);
  }
  .exec-modal-body h1:first-child, .exec-modal-body h2:first-child, .exec-modal-body h3:first-child { margin-top: 0; }
  .exec-modal-body p { margin: 6px 0; }
  .exec-modal-body p:first-child { margin-top: 0; }
  .exec-modal-body p:last-child { margin-bottom: 0; }
  .exec-modal-body ul, .exec-modal-body ol { margin: 6px 0; padding-left: 20px; }
  .exec-modal-body li { margin: 3px 0; }
  .exec-modal-body strong { color: #fff; }
  .exec-modal-body code {
    background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px;
    font-family: var(--mono); font-size: 13px;
  }
  .exec-modal-body pre {
    background: rgba(0,0,0,0.3); padding: 10px 12px; border-radius: 6px;
    overflow-x: auto; margin: 8px 0;
  }
  .exec-modal-body pre code { background: none; padding: 0; font-size: 12px; }
  .exec-modal-body blockquote {
    border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--text-muted);
  }
  .exec-modal-body a { color: var(--accent); text-decoration: none; }
  .exec-modal-body a:hover { text-decoration: underline; }
  .exec-modal-thinking {
    background: var(--thinking-bg);
    border: 1px solid rgba(51,202,255,0.15);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .exec-modal-thinking-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--accent); font-weight: 500;
  }
  .exec-modal-thinking-steps {
    display: flex; flex-direction: column; gap: 4px;
    padding-left: 22px; margin-top: 6px;
  }
  .exec-modal-thinking-step {
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .exec-modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .exec-modal-footer .token-info {
    justify-content: flex-start;
  }
  .exec-modal-trajectory {
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="notification-toast-container" id="toastContainer"></div>

<div class="header">
  <div class="header-left">
    <svg class="header-logo" width="28" height="24" viewBox="0 0 78 67" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M66.1473 0H40.0509L0.90625 66.9993H27.3601L66.1473 0Z" fill="#33CAFF"/>
      <path d="M62.1195 39.3359L77.3328 67.0026H46.9062L62.1195 39.3359Z" fill="#9850FF"/>
    </svg>
    <h1>Axari</h1>
    <span class="tag">POC</span>
  </div>
  <div class="header-actions">
    <button onclick="togglePanel()" id="panelToggleBtn">Brain</button>
    <button onclick="toggleSettings()">Settings</button>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <label>User Name</label>
  <input type="text" id="userName" value="Sai" />
  <label>Organization</label>
  <input type="text" id="orgName" value="Axari" />
  <label>Tenant ID</label>
  <input type="text" id="tenantId" value="a224d400-1e93-424e-87d9-3efafbcefa19" />
  <label>User ID</label>
  <input type="text" id="userId" value="test-user" />
  <label>Timezone</label>
  <input type="text" id="userTimezone" value="" placeholder="Auto-detected" />
  <label>Allowed Tools (comma-separated, blank = none)</label>
  <input type="text" id="allowedTools" value="" placeholder="jira:search_jira_issues, ..." />
  <label>Axari App URL</label>
  <input type="text" id="axariAppUrl" value="http://localhost:3000" placeholder="http://localhost:3000" />
</div>

<div class="main-area">
  <div class="chat-column">
    <div class="chat-container" id="chatContainer">
      <div class="messages" id="messages">
        <div class="dashboard" id="dashboard">
          <div class="dash-loading" id="dashLoading">Loading your briefing...</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Message Axari..." rows="1"
          onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <button class="stop-btn" id="stopBtn" onclick="stopExecution()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"></rect>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="panel-header">
      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="data" onclick="switchTab('data')">Data</button>
        <button class="panel-tab" data-tab="reminders" onclick="switchTab('reminders')">Reminders</button>
        <button class="panel-tab" data-tab="notes" onclick="switchTab('notes')">Notes</button>
        <button class="panel-tab" data-tab="feedback" onclick="switchTab('feedback')">Feedback</button>
        <button class="panel-tab" data-tab="responsibilities" onclick="switchTab('responsibilities')">Responsibilities <span class="tag" style="margin-left:4px;font-size:9px;padding:1px 5px">Beta</span></button>
      </div>
      <button class="panel-close" onclick="togglePanel()">&times;</button>
    </div>
    <div class="panel-body">
      <div class="panel-tab-content active" id="dataTab">
        <div class="data-cards" id="dataCards">
          <div class="panel-empty">No data yet. Tool results will appear here.</div>
        </div>
      </div>
      <div class="panel-tab-content" id="remindersTab">
        <div class="reminders-home" id="remindersHome">
          <div class="reminders-list" id="remindersList">
            <div class="panel-empty" id="remindersEmpty">No reminders yet. Commitments and action items will appear here.</div>
          </div>
          <div class="reminders-trigger" onclick="openReminderEditor()">
            <div class="reminders-trigger-box">Add a reminder...</div>
          </div>

        <div class="reminder-editor" id="reminderEditor">
          <div class="reminder-editor-header">
            <button onclick="closeReminderEditor()">&#8592; Back</button>
            <button class="save-btn" onclick="saveAndCloseReminder()">Save</button>
          </div>
          <div class="reminder-editor-body">
            <div class="reminder-field">
              <label>Title</label>
              <input type="text" id="reminderTitleInput" placeholder="What do you need to remember?" />
            </div>
            <div class="reminder-field">
              <label>Due Date (optional)</label>
              <input type="date" id="reminderDueInput" />
            </div>
            <div class="reminder-field">
              <label>Context (optional)</label>
              <textarea id="reminderContextInput" placeholder="Additional details, source, background..."></textarea>
            </div>

      <div class="panel-tab-content" id="notesTab">
        <div class="notes-home" id="notesHome">
          <div class="notes-list" id="notesList">
            <div class="panel-empty" id="notesEmpty">No notes yet. Notes from Axari and your own will appear here.</div>
          </div>
          <div class="notes-trigger" onclick="openNoteEditor()">
            <div class="notes-trigger-box">Add a note...</div>
          </div>
        </div>
        <div class="notes-editor" id="notesEditor">
          <div class="notes-editor-header">
            <button onclick="closeNoteEditor()">&#8592; Back</button>
            <button class="save-btn" onclick="saveAndCloseNote()">Save</button>
          </div>
          <textarea id="noteInput" placeholder="Write your note here..."
            onkeydown="handleNoteKeyDown(event)"></textarea>
        </div>
        <div class="notes-viewer" id="notesViewer">
          <div class="notes-viewer-header">
            <button onclick="closeNoteViewer()">&#8592; Back</button>
            <button class="delete-btn" id="noteViewerDelete">Delete</button>
          </div>
          <div class="notes-viewer-meta" id="noteViewerMeta"></div>
          <div class="notes-viewer-content" id="noteViewerContent"></div>
        </div>
      </div>
      <div class="panel-tab-content" id="feedbackTab">
        <div class="feedback-list" id="feedbackList">
          <div class="panel-empty" id="feedbackEmpty">No feedback yet.</div>
        </div>
      </div>
      <div class="panel-tab-content" id="responsibilitiesTab">
        <div class="responsibilities-list" id="responsibilitiesList">
          <div class="panel-empty">Loading responsibilities...</div>
        </div>

<!-- Execution Modal -->
<div class="exec-modal-overlay" id="execModal" style="display:none" onclick="if(event.target===this)closeExecutionModal()">
  <div class="exec-modal">
    <div class="exec-modal-header">
      <div style="display:flex;align-items:center">
        <h3 id="execModalTitle"></h3>
        <span class="exec-modal-tag">Beta</span>
      </div>
      <div class="exec-modal-header-actions">
        <button class="exec-modal-stop-btn" id="execModalStopBtn" style="display:none" onclick="stopExecution()">Stop</button>
        <button class="exec-modal-close-btn" onclick="closeExecutionModal()">&times;</button>
      </div>
    </div>
    <div class="exec-modal-body" id="execModalBody"></div>
    <div class="exec-modal-footer" id="execModalFooter" style="display:none"></div>
  </div>
